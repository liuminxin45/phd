services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phabricator-dashboard
    ports:
      - "9641:9641"
    environment:
      - NODE_ENV=production
      - PORT=9641
      # Phabricator Conduit API 配置
      # 请根据实际情况修改这些值
      - PHA_HOST=${PHA_HOST:-http://pha.tp-link.com.cn}
      - PHA_TOKEN=${PHA_TOKEN}
    restart: unless-stopped
